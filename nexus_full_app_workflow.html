let cur = 0;

function renderNav() {
  const nb = document.getElementById('navBar');
  nb.innerHTML = phases.map((p,i) =>
    `<div class="nav-pill${i===cur?' active':''}" onclick="goPhase(${i})">Phase ${p.num}: ${p.title.split('&')[0].trim()}</div>`
  ).join('');
}

function renderPhase() {
  const p = phases[cur];
  const container = document.getElementById('phaseContainer');
  const pct = Math.round(((cur+1)/phases.length)*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progLabel').textContent = `Phase ${cur+1} of ${phases.length}`;
  document.getElementById('btnPrev').disabled = cur === 0;
  document.getElementById('btnNext').disabled = cur === phases.length - 1;
  document.getElementById('btnNext').textContent = cur === phases.length-1 ? 'Done' : 'Next →';

  container.innerHTML = `
    <div class="phase active">
      <div class="phase-header">
        <div class="phase-num" style="background:${p.numBg};color:${p.numCol}">${p.num}</div>
        <div class="phase-meta">
          <div class="phase-title">${p.title}</div>
          <div class="phase-sub">${p.sub}</div>
          <div class="phase-badge" style="background:${p.badgeBg};color:${p.badgeCol}">${p.badge}</div>
        </div>
      </div>
      ${p.content}
    </div>`;
  renderNav();
}

function goPhase(n) {
  if (n < 0 || n >= phases.length) return;
  cur = n;
  renderPhase();
}

renderPhase();
